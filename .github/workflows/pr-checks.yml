name: PR checks

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Check formatting, lint, and types
        run: vp check

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp build

      - name: Build Storybook
        run: vp run build-storybook
